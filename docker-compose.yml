# Service dependencies
services:
  db:
    # Use the managed database service
    engine: pg
    version: 15
    environment:
      - POSTGRES_DB=friday_admin
      - POSTGRES_USER=doadmin
  
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001
    depends_on:
      - backend