{
  "name": "friday-admin-dashboard",
  "version": "1.0.0",
  "services": [
    {
      "name": "frontend",
      "dockerfile_path": "frontend/Dockerfile",
      "source_dir": "frontend",
      "github": {
        "branch": "main",
        "deploy_on_push": true,
        "repo": "judith-friday/friday-admin-dashboard"
      },
      "routes": [
        {
          "path": "/"
        }
      ],
      "instance_count": 1,
      "instance_size_slug": "basic-xs",
      "envs": [
        {
          "key": "NEXT_PUBLIC_API_URL",
          "scope": "RUN_TIME",
          "value": "${backend.HOSTNAME}"
        }
      ]
    },
    {
      "name": "backend",
      "dockerfile_path": "backend/Dockerfile",
      "source_dir": "backend",
      "github": {
        "branch": "main",
        "deploy_on_push": true,
        "repo": "judith-friday/friday-admin-dashboard"
      },
      "routes": [
        {
          "path": "/api"
        }
      ],
      "instance_count": 1,
      "instance_size_slug": "basic-xs",
      "envs": [
        {
          "key": "DATABASE_URL",
          "scope": "RUN_TIME",
          "value": "${db.DATABASE_URL}"
        }
      ]
    },
    {
      "name": "db",
      "engine": "PG",
      "version": "15",
      "production": false,
      "cluster_name": "friday-admin-db",
      "db_name": "friday_admin",
      "db_user": "doadmin"
    }
  ]
}