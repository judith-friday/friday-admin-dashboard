version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: friday_admin_db
    environment:
      POSTGRES_DB: friday_admin
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - friday_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: friday_admin_backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/friday_admin
      GMS_API_BASE: ${GMS_API_BASE:-http://localhost:8080}
      GMS_API_KEY: ${GMS_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-https://admin.friday.mu}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - friday_network
    volumes:
      - backend_logs:/app/logs

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.admin.friday.mu}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-https://api.admin.friday.mu}
    container_name: friday_admin_frontend
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - friday_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: friday_admin_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - friday_network

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

networks:
  friday_network:
    driver: bridge